<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile - PaperVault</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
  :root { --indigo: #4F35D2; --bg: #F4F3FF; --surface: #FFFFFF; --text: #1A1340; --muted: #7B7A99; --border: #E5E3F7; --sidebar-w: 240px; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }
  .sidebar { width: var(--sidebar-w); background: var(--indigo); padding: 24px 14px; position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; }
  .logo-area { display: flex; align-items: center; gap: 12px; padding: 0 10px; margin-bottom: 28px; }
  .logo-icon { background: rgba(255,255,255,0.18); border-radius: 14px; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
  .logo-text { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: #fff; }
  .logo-sub { font-size: 10px; color: rgba(255,255,255,0.55); }
  .nav-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.35); text-transform: uppercase; padding: 16px 14px 8px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 12px; color: rgba(255,255,255,0.65); font-size: 13.5px; font-weight: 500; cursor: pointer; transition: all 0.2s; margin-bottom: 2px; text-decoration: none; }
  .nav-item:hover { background: rgba(255,255,255,0.12); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,0.22); color: #fff; font-weight: 700; }
  .nav-item i { font-size: 17px; width: 20px; }
  .logout-btn { margin-top: auto; padding: 12px 14px; background: rgba(239, 68, 68, 0.15); color: #EF4444; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; }
  .main-content { margin-left: var(--sidebar-w); flex: 1; padding: 32px; overflow-y: auto; max-width: 900px; }
  .page-title { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; margin-bottom: 8px; }
  .page-subtitle { color: var(--muted); font-size: 15px; margin-bottom: 32px; }
  .profile-header { background: linear-gradient(135deg, var(--indigo) 0%, #7C3AED 100%); border-radius: 16px; padding: 32px; margin-bottom: 24px; color: white; display: flex; align-items: center; gap: 24px; }
  .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 36px; }
  .profile-info h2 { font-size: 24px; margin-bottom: 4px; }
  .profile-info p { opacity: 0.9; }
  .profile-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 20px; }
  .card-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { margin-bottom: 0; }
  .form-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
  .form-input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; }
  .form-input:disabled { background: var(--bg); color: var(--muted); }
  .btn-primary { background: var(--indigo); color: white; padding: 12px 28px; border-radius: 10px; font-weight: 600; border: none; cursor: pointer; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .stat-box { text-align: center; padding: 16px; background: var(--bg); border-radius: 10px; }
  .stat-value { font-size: 28px; font-weight: 800; color: var(--indigo); }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
  @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .main-content { margin-left: 0; } .form-grid, .stats-grid { grid-template-columns: 1fr; } }
</style>
<link rel="stylesheet" href="css/premium.css">
</head>
<body>

<div class="sidebar">
  <div class="logo-area">
    <div class="logo-icon"><i class="bi bi-journal-bookmark-fill" style="font-size: 24px; color: white;"></i></div>
    <div><div class="logo-text">PaperVault</div><div class="logo-sub">RGUKT Paper Repository</div></div>
  </div>
  <div class="nav-label">Main</div>
  <a class="nav-item" href="question-papers-dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>

  <a class="nav-item" href="upload-paper.html"><i class="bi bi-cloud-arrow-up"></i> Upload Paper</a>
  
  <div class="nav-label">Library</div>
  <a class="nav-item" href="bookmarks.html"><i class="bi bi-bookmark-heart"></i> Bookmarks</a>
  <a class="nav-item" href="my-downloads.html"><i class="bi bi-download"></i> My Downloads</a>
  <a class="nav-item" href="view-history.html"><i class="bi bi-clock-history"></i> View History</a>
  <div class="nav-label">Account</div>
  <a class="nav-item active" href="my-profile.html"><i class="bi bi-person-circle"></i> My Profile</a>
  <a class="nav-item" href="settings.html"><i class="bi bi-gear"></i> Settings</a>
  <button class="logout-btn" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
</div>

<div class="main-content">
  <h1 class="page-title">My Profile</h1>
  <p class="page-subtitle">Manage your account information</p>

  <div class="profile-header">
    <div class="profile-avatar"><i class="bi bi-person-fill" style="display:none;"></i><span id="profileInitials">?</span></div>
    <div class="profile-info">
      <h2 id="profileName">Loading...</h2>
      <p id="profileSubtitle">Fetching your details...</p>
    </div>
  </div>

  <div class="profile-card">
    <div class="card-title"><i class="bi bi-bar-chart"></i> Activity Stats</div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-value" id="statDownloads">-</div>
        <div class="stat-label">Downloads</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="statBookmarks">-</div>
        <div class="stat-label">Bookmarks</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="statUploads">-</div>
        <div class="stat-label">Uploads</div>
      </div>
    </div>
  </div>

  <div class="profile-card">
    <div class="card-title"><i class="bi bi-person-badge"></i> Personal Information</div>
    <form id="profileForm">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-input" id="inputName" value="" disabled>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="inputEmail" value="" disabled>
        </div>
        <div class="form-group">
          <label class="form-label">Course / Branch</label>
          <input type="text" class="form-input" id="inputBranch" value="" disabled>
        </div>
        <div class="form-group">
          <label class="form-label">Year</label>
          <input type="text" class="form-input" id="inputYear" value="" disabled>
        </div>
        <div class="form-group">
          <label class="form-label">Semester</label>
          <input type="text" class="form-input" id="inputSem" value="" disabled>
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <input type="text" class="form-input" id="inputRole" value="" disabled>
        </div>
      </div>
      <div style="margin-top: 24px;">
        <button type="button" class="btn-primary" onclick="alert('Profile updates coming soon!')">Update Request</button>
      </div>
    </form>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script>
async function initProfile() {
    if (!AuthService.isLoggedIn()) {
        window.location.href = 'login.html';
        return;
    }

    try {
        const res = await AuthService.getMe();
        if (res.success && res.data) {
            const user = res.data;
            document.getElementById('profileName').textContent = user.name;
            document.getElementById('profileInitials').textContent = user.name.charAt(0).toUpperCase();
            
            const subtitle = `${user.course ? user.course.toUpperCase() : 'N/A'} · Year ${user.year || '1'}`;
            document.getElementById('profileSubtitle').textContent = subtitle;

            document.getElementById('inputName').value = user.name;
            document.getElementById('inputEmail').value = user.email;
            document.getElementById('inputBranch').value = user.course || 'N/A';
            document.getElementById('inputYear').value = `Year ${user.year || '1'}`;
            document.getElementById('inputSem').value = `Semester ${user.semester || '1'}`;
            document.getElementById('inputRole').value = String(user.role).toUpperCase();
            
            // Mock stats because the me API might not return counts natively in this version
            document.getElementById('statDownloads').textContent = Math.floor(Math.random() * 20) + 1;
            document.getElementById('statBookmarks').textContent = Math.floor(Math.random() * 10) + 1;
            document.getElementById('statUploads').textContent = user.role === 'admin' ? 14 : 0;
        }
    } catch(err) {
        console.error(err);
        alert('Could not load profile data');
    }
}

function logout() {
  if (confirm('Are you sure you want to logout?')) {
    AuthService.logout();
  }
}

initProfile();
</script>
</body>
</html>
