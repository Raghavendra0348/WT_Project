<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bookmarks - PaperVault</title>
        <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
                rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
        <style>
                :root {
                        --indigo: #4F35D2;
                        --indigo-light: #6B52E8;
                        --violet: #7C3AED;
                        --accent: #F59E0B;
                        --accent2: #10B981;
                        --bg: #F4F3FF;
                        --surface: #FFFFFF;
                        --text: #1A1340;
                        --muted: #7B7A99;
                        --border: #E5E3F7;
                        --sidebar-w: 240px;
                }

                * {
                        margin: 0;
                        padding: 0;
                        box-sizing: border-box;
                }

                body {
                        font-family: 'DM Sans', sans-serif;
                        background: var(--bg);
                        color: var(--text);
                        min-height: 100vh;
                        display: flex;
                }

                .sidebar {
                        width: var(--sidebar-w);
                        background: var(--indigo);
                        padding: 24px 14px;
                        position: fixed;
                        top: 0;
                        left: 0;
                        bottom: 0;
                        overflow-y: auto;
                }

                .logo-area {
                        display: flex;
                        align-items: center;
                        gap: 12px;
                        padding: 0 10px;
                        margin-bottom: 28px;
                }

                .logo-icon {
                        background: rgba(255, 255, 255, 0.18);
                        border-radius: 14px;
                        width: 44px;
                        height: 44px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                }

                .logo-text {
                        font-family: 'Syne', sans-serif;
                        font-size: 18px;
                        font-weight: 800;
                        color: #fff;
                }

                .logo-sub {
                        font-size: 10px;
                        color: rgba(255, 255, 255, 0.55);
                }

                .nav-label {
                        font-size: 10px;
                        font-weight: 700;
                        color: rgba(255, 255, 255, 0.35);
                        text-transform: uppercase;
                        padding: 16px 14px 8px;
                }

                .nav-item {
                        display: flex;
                        align-items: center;
                        gap: 10px;
                        padding: 10px 14px;
                        border-radius: 12px;
                        color: rgba(255, 255, 255, 0.65);
                        font-size: 13.5px;
                        font-weight: 500;
                        cursor: pointer;
                        transition: all 0.2s;
                        margin-bottom: 2px;
                        text-decoration: none;
                }

                .nav-item:hover {
                        background: rgba(255, 255, 255, 0.12);
                        color: #fff;
                }

                .nav-item.active {
                        background: rgba(255, 255, 255, 0.22);
                        color: #fff;
                        font-weight: 700;
                }

                .nav-item i {
                        font-size: 17px;
                        width: 20px;
                }

                .logout-btn {
                        margin-top: auto;
                        padding: 12px 14px;
                        background: rgba(239, 68, 68, 0.15);
                        color: #EF4444;
                        border: none;
                        border-radius: 10px;
                        font-weight: 600;
                        cursor: pointer;
                        display: flex;
                        align-items: center;
                        gap: 10px;
                        width: 100%;
                }

                .main-content {
                        margin-left: var(--sidebar-w);
                        flex: 1;
                        padding: 32px;
                        overflow-y: auto;
                }

                .page-header {
                        margin-bottom: 32px;
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                }

                .page-title {
                        font-family: 'Syne', sans-serif;
                        font-size: 32px;
                        font-weight: 800;
                        margin-bottom: 8px;
                }

                .page-subtitle {
                        color: var(--muted);
                        font-size: 15px;
                }

                .bookmarks-stats {
                        display: flex;
                        gap: 24px;
                        margin-bottom: 24px;
                }

                .stat-card {
                        background: var(--surface);
                        border: 1.5px solid var(--border);
                        border-radius: 14px;
                        padding: 20px;
                        flex: 1;
                }

                .stat-value {
                        font-size: 32px;
                        font-weight: 800;
                        color: var(--indigo);
                        margin-bottom: 4px;
                }

                .stat-label {
                        font-size: 13px;
                        color: var(--muted);
                }

                .bookmarks-list {
                        display: flex;
                        flex-direction: column;
                        gap: 16px;
                }

                .bookmark-item {
                        background: var(--surface);
                        border: 1.5px solid var(--border);
                        border-radius: 14px;
                        padding: 20px;
                        transition: all 0.3s;
                        display: flex;
                        justify-content: space-between;
                        align-items: center;
                }

                .bookmark-item:hover {
                        border-color: var(--indigo);
                        box-shadow: 0 4px 12px rgba(79, 53, 210, 0.1);
                }

                .bookmark-info {
                        flex: 1;
                }

                .bookmark-title {
                        font-weight: 700;
                        font-size: 16px;
                        margin-bottom: 6px;
                        color: var(--text);
                }

                .bookmark-meta {
                        display: flex;
                        gap: 16px;
                        font-size: 13px;
                        color: var(--muted);
                        margin-bottom: 10px;
                }

                .bookmark-meta span {
                        display: flex;
                        align-items: center;
                        gap: 5px;
                }

                .bookmark-tags {
                        display: flex;
                        gap: 6px;
                }

                .tag {
                        padding: 4px 10px;
                        border-radius: 6px;
                        font-size: 11px;
                        font-weight: 600;
                }

                .tag-branch {
                        background: rgba(79, 53, 210, 0.1);
                        color: var(--indigo);
                }

                .tag-exam {
                        background: rgba(124, 58, 237, 0.1);
                        color: var(--violet);
                }

                .bookmark-actions {
                        display: flex;
                        gap: 8px;
                }

                .btn-icon {
                        width: 40px;
                        height: 40px;
                        border-radius: 10px;
                        border: none;
                        cursor: pointer;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        transition: all 0.2s;
                        font-size: 16px;
                }

                .btn-download {
                        background: var(--indigo);
                        color: white;
                }

                .btn-download:hover {
                        background: var(--indigo-light);
                }

                .btn-remove {
                        background: rgba(239, 68, 68, 0.1);
                        color: #EF4444;
                }

                .btn-remove:hover {
                        background: #EF4444;
                        color: white;
                }

                .empty-state {
                        text-align: center;
                        padding: 80px 20px;
                }

                .empty-icon {
                        font-size: 64px;
                        color: var(--muted);
                        margin-bottom: 16px;
                }

                .empty-title {
                        font-size: 20px;
                        font-weight: 700;
                        margin-bottom: 8px;
                }

                .empty-subtitle {
                        color: var(--muted);
                        margin-bottom: 24px;
                }

                .btn {
                        padding: 12px 24px;
                        border-radius: 10px;
                        font-weight: 600;
                        border: none;
                        cursor: pointer;
                        background: var(--indigo);
                        color: white;
                        text-decoration: none;
                        display: inline-block;
                }

                @media (max-width: 768px) {
                        .sidebar {
                                transform: translateX(-100%);
                        }

                        .main-content {
                                margin-left: 0;
                        }

                        .bookmarks-stats {
                                flex-direction: column;
                        }
                }
        </style>
<link rel="stylesheet" href="css/premium.css">
</head>

<body>

        <!-- Sidebar -->
            <!-- Background Decoration -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo-area">
            <div class="logo-icon">
                <i class="bi bi-journal-bookmark-fill" style="font-size: 20px; color: white;"></i>
            </div>
            <div>
                <div class="logo-text">PaperVault</div>
                <div class="logo-sub">PREMIUM REPOSITORY</div>
            </div>
        </div>

        <div class="nav-label">Main</div>
        <a class="nav-item" href="question-papers-dashboard.html">
            <i class="bi bi-grid-fill"></i> Dashboard
        </a>

        <a class="nav-item" href="upload-paper.html">
            <i class="bi bi-cloud-arrow-up-fill"></i> Upload Paper
        </a>
        

        <div class="nav-label">Library</div>
        <a class="nav-item active" href="bookmarks.html">
            <i class="bi bi-bookmark-heart-fill"></i> Saved
        </a>
        <a class="nav-item" href="my-downloads.html">
            <i class="bi bi-cloud-download-fill"></i> Downloads
        </a>
        <a class="nav-item" href="view-history.html">
            <i class="bi bi-clock-history"></i> View History
        </a>

        <div class="nav-label">Account</div>
        <a class="nav-item" href="my-profile.html">
            <i class="bi bi-person-badge-fill"></i> Profile
        </a>
        <a class="nav-item" href="settings.html">
            <i class="bi bi-gear-fill"></i> Settings
        </a>

        <button class="logout-btn" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i> Sign Out
        </button>
    </div>

    <!-- Main Content -->
        <div class="main-content">
                <div class="page-header">
                        <div>
                                <h1 class="page-title">My Bookmarks</h1>
                                <p class="page-subtitle">Papers you've saved for later</p>
                        </div>
                </div>

                <div class="bookmarks-stats">
                        <div class="stat-card">
                                <div class="stat-value" id="totalBookmarksStat">-</div>
                                <div class="stat-label">Total Bookmarks</div>
                        </div>
                </div>

                <div class="bookmarks-list" id="bookmarksList">
                        <!-- Bookmarks will be rendered here -->
                </div>
        </div>

        <script src="js/config.js"></script>
        <script src="js/api.js"></script>
        <script src="js/auth.js"></script>
        <script src="js/admin/role-nav.js"></script>
        <script>
                let bookmarks = [];

                async function init() {
                    if (!AuthService.isLoggedIn()) {
                        window.location.href = 'login.html';
                        return;
                    }
                    try {
                        const statsRes = await API.get('/users/stats');
                        if (statsRes.success) document.getElementById('totalBookmarksStat').textContent = statsRes.data.bookmarks;
            
                        const res = await UserService.getBookmarks();
                        if (res.success && res.data) {
                            bookmarks = res.data;
                            renderBookmarks();
                        }
                    } catch (e) {
                        console.error('Error loading bookmarks', e);
                    }
                }

                function renderBookmarks() {
                        const list = document.getElementById('bookmarksList');

                        if (!bookmarks || bookmarks.length === 0) {
                                list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><i class="bi bi-bookmark"></i></div>
        <div class="empty-title">No bookmarks yet</div>
        <div class="empty-subtitle">Start bookmarking papers to save them for later</div>
        <a href="question-papers-dashboard.html" class="btn">Browse Dashboard</a>
      </div>
    `;
                                return;
                        }

                        list.innerHTML = bookmarks.map(bm => {
                                const examText = bm.examType.charAt(0).toUpperCase() + bm.examType.slice(1);
                                return `
    <div class="bookmark-item">
      <div class="bookmark-info">
        <div class="bookmark-title">${bm.title || bm.subject}</div>
        <div class="bookmark-meta">
          <span><i class="bi bi-calendar3"></i> ${bm.examYear}</span>
          <span><i class="bi bi-folder"></i> ${String(bm.course).toUpperCase()}</span>
          <span><i class="bi bi-clock"></i> Year ${bm.year} Sem ${bm.semester}</span>
        </div>
        <div class="bookmark-tags">
          <span class="tag tag-branch">${String(bm.course).toUpperCase()}</span>
          <span class="tag tag-exam">${examText}</span>
        </div>
      </div>
      <div class="bookmark-actions">
        <button class="btn-icon btn-download" onclick="downloadPaper(${bm.id})" title="Download">
          <i class="bi bi-download"></i>
        </button>
        <button class="btn-icon btn-remove" onclick="removeBookmark(${bm.id})" title="Remove">
          <i class="bi bi-bookmark-x-fill"></i>
        </button>
      </div>
    </div>
  `}).join('');
                }

                async function downloadPaper(id) {
                    try {
                        const res = await PaperService.downloadPaper(id);
                        if(res.url) window.open(res.url, '_blank');
                    } catch(e) {
                        alert('Could not download paper.');
                    }
                }

                async function removeBookmark(id) {
                        if (confirm('Remove this bookmark?')) {
                                try {
                                        await UserService.removeBookmark(id);
                                        bookmarks = bookmarks.filter(b => b.id !== id);
                                        document.getElementById('totalBookmarksStat').textContent = bookmarks.length;
                                        renderBookmarks();
                                } catch(e) {
                                        alert('Could not remove bookmark.');
                                }
                        }
                }

                function logout() {
                        if (confirm('Are you sure you want to logout?')) {
                                AuthService.logout();
                        }
                }

                init();
        </script>

</body>

</html>
